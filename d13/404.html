<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Page Not Found | Auto Body Lopez</title>
<!-- Self-contained (inline CSS): a 404 can be served at any path depth, so it must not
     depend on a relative stylesheet link. Palette matches the site (charcoal + gold + red). -->
<style>
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;display:flex;flex-direction:column;align-items:center;
    justify-content:center;text-align:center;padding:32px;gap:6px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(120% 140% at 15% -10%,#3a2c17 0%,#1c160f 55%);color:#faf5ea;}
  .code{font-weight:800;font-size:clamp(3.5rem,14vw,6rem);line-height:1;color:#f0ab2e;letter-spacing:-.02em;}
  h1{font-weight:800;font-size:clamp(1.4rem,4vw,2rem);margin:.2em 0 .1em;}
  p{color:#e7dfce;max-width:44ch;margin:.2em 0 1.4em;line-height:1.5;}
  .btns{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;}
  a.btn{text-decoration:none;font-weight:700;padding:13px 22px;border-radius:10px;}
  .primary{background:#c9332a;color:#fff;}
  .ghost{border:1.5px solid rgba(255,255,255,.4);color:#fff;}
  a.btn:focus-visible{outline:3px solid #f0ab2e;outline-offset:2px;}
</style>
</head>
<body>
  <div class="code">404</div>
  <h1>We couldn't find that page</h1>
  <p>The page may have moved. Head back to the homepage, or give us a call &mdash; we're happy to help.</p>
  <div class="btns">
    <a class="btn primary" href="/">Back to homepage</a>
    <a class="btn ghost" href="tel:+16517568621">Call (651) 756-8621</a>
  </div>
</body>
</html>
