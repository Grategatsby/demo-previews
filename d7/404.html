<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Page Not Found | LaMotte &amp; Son Auto Repair</title>
<!-- Self-contained (inline CSS): a 404 can be served at any path depth, so it must not
     depend on a relative stylesheet link. Palette matches the site (navy + brick red). -->
<style>
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;display:flex;flex-direction:column;align-items:center;
    justify-content:center;text-align:center;padding:32px;gap:6px;
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(circle at 85% 0%,#2c6690 0%,#1d4e73 45%,#143a58 100%);color:#faf6ee;}
  .code{font-family:"Oswald",sans-serif;font-weight:700;font-size:clamp(3.5rem,14vw,6rem);
    line-height:1;color:#f0b3a9;letter-spacing:.02em;}
  h1{font-family:"Oswald",sans-serif;font-weight:600;font-size:clamp(1.4rem,4vw,2rem);margin:.2em 0 .1em;}
  p{color:#cfe0ee;max-width:44ch;margin:.2em 0 1.4em;line-height:1.5;}
  .btns{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;}
  a.btn{text-decoration:none;font-weight:700;padding:13px 22px;border-radius:8px;}
  .primary{background:#a8342a;color:#fff;}
  .ghost{border:1.5px solid rgba(255,255,255,.4);color:#fff;}
  a.btn:focus-visible{outline:3px solid #f2b632;outline-offset:2px;}
</style>
</head>
<body>
  <div class="code">404</div>
  <h1>We couldn't find that page</h1>
  <p>The page may have moved. Head back to the homepage, or give us a call &mdash; we're happy to help.</p>
  <div class="btns">
    <a class="btn primary" href="/">Back to homepage</a>
    <a class="btn ghost" href="tel:+16514590847">Call (651) 459-0847</a>
  </div>
</body>
</html>
